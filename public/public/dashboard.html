<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MD Elite Capital — Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0A0602;color:#FFE8CC;font-family:sans-serif;min-height:100vh;padding:20px}
.top{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;background:#120C04;border-bottom:1px solid rgba(255,107,0,0.2);margin-bottom:24px}
.logo{color:#FF6B00;font-size:18px;font-weight:bold}
.logout{background:transparent;color:#FF6B00;border:1px solid rgba(255,107,0,0.3);padding:8px 16px;cursor:pointer;font-size:12px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px}
.card{background:#120C04;border:1px solid rgba(255,107,0,0.15);padding:20px}
.card-label{font-size:9px;letter-spacing:3px;color:rgba(255,165,0,0.4);text-transform:uppercase;margin-bottom:8px}
.card-value{font-size:24px;font-weight:bold;color:#FF6B00}
.card-value.green{color:#00D084}
.section{background:#120C04;border:1px solid rgba(255,107,0,0.15);padding:20px;margin-bottom:16px}
.section-title{font-size:12px;letter-spacing:3px;color:#FFA500;text-transform:uppercase;margin-bottom:16px}
.challenge{background:rgba(255,107,0,0.05);border:1px solid rgba(255,107,0,0.15);padding:16px;margin-bottom:12px}
.progress-bg{background:rgba(255,107,0,0.1);height:6px;margin:10px 0;border-radius:3px}
.progress-fg{height:6px;background:linear-gradient(90deg,#FF6B00,#FFA500);border-radius:3px}
.btn{background:#FF6B00;color:#fff;border:none;padding:12px 24px;cursor:pointer;font-size:12px;font-weight:bold;letter-spacing:2px;text-transform:uppercase;width:100%;margin-top:8px}
.empty{color:rgba(255,165,0,0.3);font-style:italic;font-size:14px;text-align:center;padding:24px}
</style>
</head>
<body>
<div class="top">
  <div class="logo">🐋 MD Elite Capital</div>
  <button class="logout" onclick="logout()">Sign Out</button>
</div>
<div style="max-width:900px;margin:0 auto;padding:0 16px">
  <div class="grid" id="metrics">
    <div class="card"><div class="card-label">Total Balance</div><div class="card-value" id="balance">Loading...</div></div>
    <div class="card"><div class="card-label">Total Profit</div><div class="card-value green" id="profit">—</div></div>
    <div class="card"><div class="card-label">Withdrawable</div><div class="card-value green" id="withdraw">—</div></div>
    <div class="card"><div class="card-label">Accounts</div><div class="card-value" id="accs">—</div></div>
  </div>
  <div class="section">
    <div class="section-title">My Challenges</div>
    <div id="challenges"><div class="empty">Loading...</div></div>
  </div>
  <div class="section">
    <div class="section-title">Funded Accounts</div>
    <div id="accounts"><div class="empty">Loading...</div></div>
  </div>
</div>
<script>
const token=localStorage.getItem('md_token');
if(!token)window.location.href='/login';
const params=new URLSearchParams(window.location.search);
if(params.get('token')){localStorage.setItem('md_token',params.get('token'));window.location.href='/dashboard';}
function logout(){localStorage.removeItem('md_token');window.location.href='/login'}
function fmt(n){return'£'+Number(n||0).toLocaleString('en-GB',{minimumFractionDigits:2,maximumFractionDigits:2})}
async function load(){
try{
const r=await fetch('/api/dashboard',{headers:{Authorization:'Bearer '+token}});
if(!r.ok){logout();return}
const d=await r.json();
document.getElementById('balance').textContent=fmt(d.summary.totalBalance);
document.getElementById('profit').textContent=fmt(d.summary.totalProfit);
document.getElementById('withdraw').textContent=fmt(d.summary.withdrawable);
document.getElementById('accs').textContent=d.accounts.length;
const ch=document.getElementById('challenges');
if(!d.challenges.length){ch.innerHTML='<div class="empty">No challenges yet. <a href="/" style="color:#FF6B00">Join for ₦10,000 →</a></div>';}
else{ch.innerHTML=d.challenges.map(c=>`<div class="challenge"><div style="display:flex;justify-content:space-between"><span style="color:#FFA500;font-weight:bold">£${Number(c.account_size).toLocaleString()} ${c.tier}</span><span style="color:${c.status==='passed'?'#00D084':c.status==='failed'?'#FF3B30':'#FFA500'}">${c.status.toUpperCase()}</span></div><div style="font-size:13px;color:rgba(255,165,0,0.5);margin-top:4px">Profit: ${c.profit_pct.toFixed(2)}% / 8% target</div><div class="progress-bg"><div class="progress-fg" style="width:${Math.min(100,(c.profit_pct/8)*100)}%"></div></div></div>`).join('');}
const ac=document.getElementById('accounts');
if(!d.accounts.length){ac.innerHTML='<div class="empty">No funded accounts yet. Pass your challenge to get funded.</div>';}
else{ac.innerHTML=d.accounts.map(a=>`<div class="challenge"><div style="display:flex;justify-content:space-between"><span style="color:#FF6B00;font-size:20px;font-weight:bold">£${Number(a.account_size).toLocaleString()}</span><span style="color:#00D084">${a.tier} — ACTIVE</span></div><div style="font-size:13px;color:rgba(255,165,0,0.5);margin:8px 0">MT5 Login: ${a.mt5_login||'—'} | Server: ${a.mt5_server}</div><div style="font-size:13px;color:rgba(255,165,0,0.5)">Withdrawable: <span style="color:#00D084">${fmt(a.withdrawable)}</span> | Split: ${a.profit_split}%</div></div>`).join('');}
}catch(e){console.error(e)}
}
load();
</script>
</body>
</html>
